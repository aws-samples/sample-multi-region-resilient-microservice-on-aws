# ~~ Generated by projen. To modify, edit .projenrc.js and run "npx projen".

name: pr-validation
on:
  pull_request:
    branches:
      - main
    paths:
      - source/**
      - deployment/**
      - .github/workflows/pr-validation.yml
  workflow_dispatch: {}
jobs:
  cfn-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cfn-lint
        run: pip install cfn-lint
      - name: Run cfn-lint
        run: cfn-lint deployment/**/*.yaml deployment/**/*.yml --ignore-templates deployment/mirror-sidecar-buildspec.yml
  checkov:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: deployment
          framework: cloudformation
          config_file: .checkov.yaml
          skip_path: deployment/github-oidc-role.yaml,deployment/mirror-sidecar-buildspec.yml
          quiet: "true"
  cfn-nag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run cfn-nag
        uses: stelligent/cfn_nag@master
        with:
          input_path: deployment
          extra_args: --fail-on-warnings false
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install pytest pyyaml
      - name: Run tests
        run: pytest tests/
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Scan filesystem for vulnerabilities
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: source
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"
