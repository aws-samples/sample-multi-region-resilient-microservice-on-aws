# ~~ Generated by projen. To modify, edit .projenrc.js and run "npx projen".

name: pr-validation
on:
  pull_request:
    branches:
      - main
    paths:
      - source/**
      - deployment/**
      - .github/workflows/pr-validation.yml
  workflow_dispatch: {}
jobs:
  cfn-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cfn-lint
        run: pip install cfn-lint
      - name: Run cfn-lint
        run: cfn-lint deployment/**/*.yaml deployment/**/*.yml --ignore-templates deployment/mirror-sidecar-buildspec.yml --ignore-checks W3005,W2001,W8001,W1020,W7001,W1031,E1029,E3030
  checkov:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: deployment
          framework: cloudformation
          config_file: .checkov.yaml
          skip_path: deployment/github-oidc-role.yaml,deployment/mirror-sidecar-buildspec.yml
          quiet: "true"
  cfn-nag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Run cfn-nag
        uses: stelligent/cfn_nag@master
        with:
          input_path: deployment
          extra_args: --fail-on-warnings false
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install pytest pyyaml
      - name: Run tests
        run: pytest tests/
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Install trivy
        run: |-
          TRIVY_VERSION=0.69.3
          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | sudo tar -xzC /usr/local/bin trivy
          trivy --version
      - name: Scan filesystem for vulnerabilities
        run: trivy fs source --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed --no-progress
