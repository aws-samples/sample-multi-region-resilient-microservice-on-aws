# ~~ Generated by projen. To modify, edit .projenrc.js and run "npx projen".

name: e2e
on:
  push:
    branches:
      - main
    paths:
      - source/**
      - deployment/**
      - .github/workflows/e2e.yml
  pull_request:
    branches:
      - main
    paths:
      - source/**
      - deployment/**
      - .github/workflows/e2e.yml
  workflow_dispatch: {}
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true
jobs:
  e2e:
    name: Build, Deploy, Test, Teardown
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
      STANDBY_REGION: us-west-2
      ENV: -${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.E2E_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 7200
      - name: Install dependencies
        run: |-
          sudo apt-get update -qq && sudo apt-get install -y -qq jq zip
          pip3 install boto3 --quiet
      - name: Build images (both regions)
        run: make build-images ENV=${{ env.ENV }}
        working-directory: deployment
      - name: Deploy (full multi-region)
        run: make deploy ENV=${{ env.ENV }}
        working-directory: deployment
      - name: Capture failure diagnostics
        if: failure()
        run: |-
          set +e
          echo "::group::Failed and in-progress stacks (both regions)"
          for region in ${{ env.AWS_REGION }} ${{ env.STANDBY_REGION }}; do
            echo "=== $region ==="
            aws cloudformation list-stacks --region "$region" --no-cli-pager \
              --query "StackSummaries[?StackStatus=='CREATE_FAILED' || StackStatus=='ROLLBACK_IN_PROGRESS' || StackStatus=='ROLLBACK_COMPLETE' || StackStatus=='ROLLBACK_FAILED' || StackStatus=='REVIEW_IN_PROGRESS' || StackStatus=='CREATE_IN_PROGRESS'].[StackName, StackStatus]" \
              --output text
          done
          echo "::endgroup::"

          echo "::group::Recent failed change sets (catalog-db-stack)"
          for region in ${{ env.AWS_REGION }} ${{ env.STANDBY_REGION }}; do
            echo "=== $region ==="
            STACK="catalog-db-stack${{ env.ENV }}"
            aws cloudformation list-change-sets --stack-name "$STACK" --region "$region" --no-cli-pager 2>&1 | head -30 || true
            CS=$(aws cloudformation list-change-sets --stack-name "$STACK" --region "$region" --no-cli-pager --query "Summaries[0].ChangeSetId" --output text 2>/dev/null)
            if [ -n "$CS" ] && [ "$CS" != "None" ]; then
              aws cloudformation describe-change-set --change-set-name "$CS" --region "$region" --no-cli-pager \
                --query "{Status:Status,StatusReason:StatusReason,Hooks:Hooks}" --output json || true
              # Pre-provisioning validation failures (EarlyValidation hook) surface here, not in describe-stack-events.
              echo "--- describe-events (pre-provisioning validation details) ---"
              aws cloudformation describe-events --change-set-name "$CS" --region "$region" --no-cli-pager --filters FailedEvents=true --output json 2>&1 | head -100 || true
            fi
          done
          echo "::endgroup::"

          echo "::group::Recent stack events (last 20 per stack)"
          for region in ${{ env.AWS_REGION }} ${{ env.STANDBY_REGION }}; do
            echo "=== $region ==="
            for stack in catalog-db-stack${{ env.ENV }} apps${{ env.ENV }} baseInfra${{ env.ENV }}; do
              echo "--- $stack ---"
              aws cloudformation describe-stack-events --stack-name "$stack" --region "$region" --no-cli-pager \
                --max-items 20 --query "StackEvents[*].[Timestamp,LogicalResourceId,ResourceStatus,ResourceStatusReason]" --output text 2>&1 | head -25 || true
            done
          done
          echo "::endgroup::"
      - name: Smoke test
        run: |-
          echo "Waiting for ECS services to stabilize in primary region..."
          aws ecs wait services-stable \
            --cluster apps-EcsCluster${{ env.ENV }} \
            --services checkout${{ env.ENV }} ui${{ env.ENV }} catalog${{ env.ENV }} carts${{ env.ENV }} orders${{ env.ENV }} \
            --region ${{ env.AWS_REGION }} || true

          echo "Waiting for ECS services to stabilize in standby region..."
          aws ecs wait services-stable \
            --cluster apps-EcsCluster${{ env.ENV }} \
            --services checkout${{ env.ENV }} ui${{ env.ENV }} catalog${{ env.ENV }} carts${{ env.ENV }} orders${{ env.ENV }} \
            --region ${{ env.STANDBY_REGION }} || true

          for region in ${{ env.AWS_REGION }} ${{ env.STANDBY_REGION }}; do
            ALB_DNS=$(aws cloudformation describe-stacks \
              --stack-name apps${{ env.ENV }} --region "$region" \
              --query "Stacks[0].Outputs[?OutputKey=='LoadBalancerDNS'].OutputValue" --output text)

            echo "Testing ALB endpoint in $region: $ALB_DNS"
            passed=false
            for i in $(seq 1 30); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS" || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "  $region responding (HTTP 200)"
                passed=true
                break
              fi
              echo "  Attempt $i ($region): HTTP $HTTP_CODE - retrying in 10s..."
              sleep 10
            done
            if [ "$passed" != "true" ]; then
              echo "$region did not respond after 5 minutes"
              exit 1
            fi
          done
        working-directory: deployment
      - name: Teardown
        if: always()
        run: |-
          echo "Cleaning up e2e environment..."
          make destroy-all ENV=${{ env.ENV }} || true

          # Belt-and-suspenders: ensure VPC stacks are gone in both regions.
          for region in ${{ env.AWS_REGION }} ${{ env.STANDBY_REGION }}; do
            aws cloudformation delete-stack --stack-name baseInfra${{ env.ENV }} --region "$region" || true
            aws cloudformation wait stack-delete-complete --stack-name baseInfra${{ env.ENV }} --region "$region" || true
          done
          # baseVpc: standby first (peering connection lives on standby side).
          aws cloudformation delete-stack --stack-name baseVpc${{ env.ENV }} --region ${{ env.STANDBY_REGION }} || true
          aws cloudformation wait stack-delete-complete --stack-name baseVpc${{ env.ENV }} --region ${{ env.STANDBY_REGION }} || true
          aws cloudformation delete-stack --stack-name baseVpc${{ env.ENV }} --region ${{ env.AWS_REGION }} || true
          aws cloudformation wait stack-delete-complete --stack-name baseVpc${{ env.ENV }} --region ${{ env.AWS_REGION }} || true

          # Delete ECR repos in both regions.
          for region in ${{ env.AWS_REGION }} ${{ env.STANDBY_REGION }}; do
            for repo in catalog checkout ui carts assets orders cloudwatch-agent adot-autoinstrumentation-java adot-autoinstrumentation-node; do
              aws ecr delete-repository --force --repository-name ${repo}${{ env.ENV }} --region "$region" --no-cli-pager 2>/dev/null || true
            done
          done

          echo "Teardown complete"
        working-directory: deployment
    timeout-minutes: 180
