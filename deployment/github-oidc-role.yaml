AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC role for e2e workflow

Parameters:
  GitHubOrg:
    Type: String
    Default: aws-samples
  GitHubRepo:
    Type: String
    Default: sample-multi-region-resilient-microservice-on-aws

Conditions:
  CreateOIDCProvider: !Equals
    - !Sub '{{resolve:ssm:/github/oidc-provider-exists:1}}'
    - 'create'

Resources:
  # Only create if not already present (shared across repos in this account).
  # SSM parameter /github/oidc-provider-exists controls creation:
  #   - value 'create' -> stack creates the OIDC provider
  #   - any other value (e.g., the existing ARN) -> stack skips creation
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  E2ERole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-actions-microservice-e2e
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub 'repo:${GitHubOrg}/${GitHubRepo}:pull_request'
                  - !Sub 'repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main'
      Policies:
        - PolicyName: e2e-deploy-and-cleanup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:ListStacks
                  - cloudformation:GetTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                Resource: '*'
              - Sid: ECR
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:CreateRepository
                  - ecr:DeleteRepository
                  - ecr:DescribeRepositories
                  - ecr:DescribeImages
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: '*'
              - Sid: ECS
                Effect: Allow
                Action:
                  - ecs:CreateCluster
                  - ecs:DeleteCluster
                  - ecs:DescribeClusters
                  - ecs:CreateService
                  - ecs:UpdateService
                  - ecs:DeleteService
                  - ecs:DescribeServices
                  - ecs:RegisterTaskDefinition
                  - ecs:DeregisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - ecs:ListTasks
                  - ecs:DescribeTasks
                  - ecs:CreateTaskSet
                  - ecs:TagResource
                Resource: '*'
              - Sid: CodeBuild
                Effect: Allow
                Action:
                  - codebuild:CreateProject
                  - codebuild:DeleteProject
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                  - codebuild:BatchGetProjects
                Resource: '*'
              - Sid: IAM
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PassRole
                  - iam:ListRoles
                  - iam:CreateServiceLinkedRole
                  - iam:TagRole
                Resource: '*'
              - Sid: VPCNetworking
                Effect: Allow
                Action:
                  - ec2:CreateVpc
                  - ec2:DeleteVpc
                  - ec2:DescribeVpcs
                  - ec2:CreateSubnet
                  - ec2:DeleteSubnet
                  - ec2:DescribeSubnets
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:DescribeSecurityGroups
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:CreateInternetGateway
                  - ec2:DeleteInternetGateway
                  - ec2:AttachInternetGateway
                  - ec2:DetachInternetGateway
                  - ec2:DescribeInternetGateways
                  - ec2:CreateRouteTable
                  - ec2:DeleteRouteTable
                  - ec2:DescribeRouteTables
                  - ec2:CreateRoute
                  - ec2:DeleteRoute
                  - ec2:AssociateRouteTable
                  - ec2:DisassociateRouteTable
                  - ec2:AllocateAddress
                  - ec2:ReleaseAddress
                  - ec2:DescribeAddresses
                  - ec2:CreateNatGateway
                  - ec2:DeleteNatGateway
                  - ec2:DescribeNatGateways
                  - ec2:CreateVpcPeeringConnection
                  - ec2:DeleteVpcPeeringConnection
                  - ec2:AcceptVpcPeeringConnection
                  - ec2:DescribeVpcPeeringConnections
                  - ec2:CreateVpcEndpoint
                  - ec2:DeleteVpcEndpoints
                  - ec2:DescribeVpcEndpoints
                  - ec2:ModifyVpcAttribute
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                  - ec2:DetachNetworkInterface
                  - ec2:CreateTags
                  - ec2:DescribeAvailabilityZones
                Resource: '*'
              - Sid: RDS
                Effect: Allow
                Action:
                  - rds:CreateDBCluster
                  - rds:DeleteDBCluster
                  - rds:DescribeDBClusters
                  - rds:CreateDBInstance
                  - rds:DeleteDBInstance
                  - rds:DescribeDBInstances
                  - rds:CreateGlobalCluster
                  - rds:DeleteGlobalCluster
                  - rds:DescribeGlobalClusters
                  - rds:RemoveFromGlobalCluster
                  - rds:CreateDBSubnetGroup
                  - rds:DeleteDBSubnetGroup
                  - rds:DescribeDBSubnetGroups
                  - rds:ModifyDBCluster
                  - rds:AddTagsToResource
                Resource: '*'
              - Sid: DynamoDB
                Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                  - dynamodb:UpdateTable
                  - dynamodb:CreateGlobalTable
                  - dynamodb:DescribeGlobalTable
                  - dynamodb:UpdateGlobalTable
                  - dynamodb:TagResource
                Resource: '*'
              - Sid: DSQL
                Effect: Allow
                Action:
                  - dsql:CreateCluster
                  - dsql:DeleteCluster
                  - dsql:GetCluster
                  - dsql:ListClusters
                  - dsql:GetVpcEndpointServiceName
                  - dsql:TagResource
                Resource: '*'
              - Sid: S3
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:PutBucketVersioning
                  - s3:GetBucketLocation
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucketVersions
                  - s3:GetObjectVersion
                  - s3:DeleteObjectVersion
                  - s3:PutEncryptionConfiguration
                  - s3:GetEncryptionConfiguration
                Resource: '*'
              - Sid: SecretsManager
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:DescribeSecret
                  - secretsmanager:TagResource
                Resource: '*'
              - Sid: SSM
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:GetParameters
                  - ssm:StartAutomationExecution
                  - ssm:DescribeAutomationExecutions
                Resource: '*'
              - Sid: KMS
                Effect: Allow
                Action:
                  - kms:CreateKey
                  - kms:CreateAlias
                  - kms:DeleteAlias
                  - kms:DescribeKey
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:GenerateDataKey
                  - kms:ScheduleKeyDeletion
                  - kms:TagResource
                Resource: '*'
              - Sid: ELB
                Effect: Allow
                Action:
                  - elasticloadbalancing:CreateLoadBalancer
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:CreateTargetGroup
                  - elasticloadbalancing:DeleteTargetGroup
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:CreateListener
                  - elasticloadbalancing:DeleteListener
                  - elasticloadbalancing:ModifyLoadBalancerAttributes
                  - elasticloadbalancing:ModifyTargetGroupAttributes
                  - elasticloadbalancing:AddTags
                Resource: '*'
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                Resource: '*'
              - Sid: Lambda
                Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:InvokeFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:PublishLayerVersion
                  - lambda:GetLayerVersion
                  - lambda:ListFunctions
                  - lambda:TagResource
                Resource: '*'
              - Sid: Route53
                Effect: Allow
                Action:
                  - route53:CreateHostedZone
                  - route53:DeleteHostedZone
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                  - route53:CreateHealthCheck
                  - route53:DeleteHealthCheck
                  - route53:GetHealthCheck
                Resource: '*'
              - Sid: ARCRegionSwitch
                Effect: Allow
                Action:
                  - arc-region-switch:*
                Resource: '*'
              - Sid: EventBridge
                Effect: Allow
                Action:
                  - events:PutRule
                  - events:DeleteRule
                  - events:PutTargets
                  - events:RemoveTargets
                  - events:EnableRule
                  - events:DisableRule
                  - events:DescribeRule
                Resource: '*'
              - Sid: Synthetics
                Effect: Allow
                Action:
                  - synthetics:CreateCanary
                  - synthetics:DeleteCanary
                  - synthetics:GetCanary
                  - synthetics:GetCanaryRuns
                  - synthetics:StartCanary
                  - synthetics:StopCanary
                  - synthetics:DescribeCanaries
                Resource: '*'
              - Sid: Identity
                Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: '*'

Outputs:
  RoleArn:
    Value: !GetAtt E2ERole.Arn
    Description: Set this as the E2E_ROLE_ARN GitHub secret
