#
# ─── PURPOSE ────────────────────────────────────────────────────────────────────
# Creates an IAM role that GitHub Actions assumes via OIDC to run the e2e
# workflow (deploy, smoke-test, teardown) without long-lived credentials.
#
# ─── PREREQUISITES ──────────────────────────────────────────────────────────────
# 1. An SSM parameter /github/oidc-provider-exists must exist in the target
#    account. Set it to 'create' if no OIDC provider exists yet, or to the
#    existing provider ARN to skip creation (shared across repos).
#
# ─── DEPLOY ─────────────────────────────────────────────────────────────────────
#   aws cloudformation deploy \
#     --stack-name github-oidc-microservice-e2e \
#     --template-file deployment/github-oidc-role.yaml \
#     --capabilities CAPABILITY_NAMED_IAM \
#     --region us-east-1
#
# ─── AFTER DEPLOY ───────────────────────────────────────────────────────────────
# Copy the RoleArn output and set it as the E2E_ROLE_ARN secret on the GitHub
# repo: Settings → Secrets and variables → Actions → New repository secret.
#
# ─── NOTES ──────────────────────────────────────────────────────────────────────
# • MaxSessionDuration is 8h to cover full e2e cycle (deploy ~90m + test +
#   teardown ~60m) with headroom for slow CloudFormation operations.
# • Trust policy restricts to pull_request and refs/heads/main only.
# • Regional permissions are scoped to us-east-1 and us-west-2.
# ────────────────────────────────────────────────────────────────────────────────
AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub Actions OIDC role for e2e workflow

Parameters:
  GitHubOrg:
    Type: String
    Default: aws-samples
  GitHubRepo:
    Type: String
    Default: sample-multi-region-resilient-microservice-on-aws

Conditions:
  CreateOIDCProvider: !Equals
    - !Sub '{{resolve:ssm:/github/oidc-provider-exists:1}}'
    - 'create'

Resources:
  # Only create if not already present (shared across repos in this account).
  # SSM parameter /github/oidc-provider-exists controls creation:
  #   - value 'create' -> stack creates the OIDC provider
  #   - any other value (e.g., the existing ARN) -> stack skips creation
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  E2ERole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-actions-microservice-e2e
      # 8h to cover the full e2e: build ~15m + deploy ~90m + smoke test ~10m
      # + teardown ~60m = ~3h minimum, with headroom for slow stack ops. The
      # previous 2h (7200) caused the token to expire mid-teardown, leaving
      # orphaned stacks because every CloudFormation call got ExpiredToken.
      MaxSessionDuration: 28800
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub 'repo:${GitHubOrg}/${GitHubRepo}:pull_request'
                  - !Sub 'repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main'
      ManagedPolicyArns:
        - !Ref RegionalServicesPolicy
        - !Ref GlobalServicesPolicy

  # Regional services: CloudFormation, ECS, ECR, RDS/Aurora, DynamoDB, DSQL,
  # ElastiCache, MQ, EC2, ELB, Lambda, KMS (regional keys), SecretsManager,
  # SSM, CloudWatch (logs/metrics/alarms/dashboards/synthetics), SNS, EventBridge,
  # CodeBuild, ApplicationAutoScaling, FIS. All scoped to us-east-1 / us-west-2.
  RegionalServicesPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: github-actions-microservice-e2e-regional
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: RegionalServiceAccess
            Effect: Allow
            Action:
              - cloudformation:*
              - ecs:*
              - ecr:*
              - rds:*
              - dynamodb:*
              - dsql:*
              - elasticache:*
              - mq:*
              - ec2:*
              - elasticloadbalancing:*
              - lambda:*
              - kms:*
              - secretsmanager:*
              - ssm:*
              - logs:*
              - cloudwatch:*
              - sns:*
              - events:*
              - synthetics:*
              - codebuild:*
              - application-autoscaling:*
              - fis:*
              - autoscaling:*
              - acm:*
              - cognito-idp:*
              - states:*
              - resource-groups:*
              - tag:*
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestedRegion:
                  - us-east-1
                  - us-west-2
          # DSQL multi-Region cluster setup (PutWitnessRegion, PutMultiRegionProperties,
          # AddPeerCluster) is evaluated against the witness Region too, which is us-east-2
          # and therefore outside the us-east-1/us-west-2 allowlist above. Grant these
          # specific actions without the RequestedRegion condition; resource scoping keeps
          # the blast radius to DSQL clusters in this account.
          - Sid: DSQLMultiRegionSetup
            Effect: Allow
            Action:
              - dsql:CreateCluster
              - dsql:PutMultiRegionProperties
              - dsql:PutWitnessRegion
              - dsql:AddPeerCluster
              - dsql:UpdateCluster
              - dsql:GetCluster
              - dsql:DeleteCluster
              - dsql:TagResource
              - dsql:UntagResource
              - dsql:ListTagsForResource
            Resource: !Sub 'arn:aws:dsql:*:${AWS::AccountId}:cluster/*'
          # DynamoDB Global Table MRSC (Multi-Region Strong Consistency) uses a witness
          # Region (us-east-2) for quorum. CreateGlobalTableWitness and related actions
          # are evaluated against the witness Region context, outside the us-east-1/us-west-2
          # allowlist. Scope stays to this account's DDB tables in any Region.
          - Sid: DynamoDBGlobalTableWitness
            Effect: Allow
            Action:
              - dynamodb:CreateGlobalTableWitness
              - dynamodb:DeleteGlobalTableWitness
              - dynamodb:DescribeGlobalTableWitness
              - dynamodb:UpdateGlobalTableWitness
              - dynamodb:DescribeTable
              - dynamodb:DescribeGlobalTable
            Resource: !Sub 'arn:aws:dynamodb:*:${AWS::AccountId}:table/*'

  # Global services: IAM, Route 53, ARC Region Switch, S3, STS.
  # IAM and S3 don't support aws:RequestedRegion conditions; the trust
  # policy and account boundary are the safety controls instead.
  GlobalServicesPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: github-actions-microservice-e2e-global
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: IAMForCFN
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:UpdateRole
              - iam:UpdateAssumeRolePolicy
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
              - iam:PassRole
              - iam:ListRoles
              - iam:CreateServiceLinkedRole
              - iam:DeleteServiceLinkedRole
              - iam:GetServiceLinkedRoleDeletionStatus
              - iam:TagRole
              - iam:UntagRole
              - iam:ListRoleTags
              - iam:CreateInstanceProfile
              - iam:DeleteInstanceProfile
              - iam:GetInstanceProfile
              - iam:AddRoleToInstanceProfile
              - iam:RemoveRoleFromInstanceProfile
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
              - iam:ListPolicyVersions
              - iam:CreateOpenIDConnectProvider
              - iam:DeleteOpenIDConnectProvider
              - iam:GetOpenIDConnectProvider
              - iam:UpdateOpenIDConnectProviderThumbprint
              - iam:ListOpenIDConnectProviders
              - iam:TagOpenIDConnectProvider
            Resource: '*'
          - Sid: Route53
            Effect: Allow
            Action:
              - route53:*
              - route53-recovery-control-config:*
              - route53-recovery-readiness:*
              - route53-recovery-cluster:*
            Resource: '*'
          - Sid: ARCRegionSwitch
            Effect: Allow
            Action:
              - arc-region-switch:*
              - arc-zonal-shift:*
            Resource: '*'
          - Sid: S3
            Effect: Allow
            Action:
              - s3:*
            Resource: '*'
          - Sid: Identity
            Effect: Allow
            Action:
              - sts:GetCallerIdentity
              - sts:GetSessionToken
            Resource: '*'

Outputs:
  RoleArn:
    Value: !GetAtt E2ERole.Arn
    Description: Set this as the E2E_ROLE_ARN GitHub secret
