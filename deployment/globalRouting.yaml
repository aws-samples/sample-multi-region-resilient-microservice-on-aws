AWSTemplateFormatVersion: "2010-09-09"
Description: 'Global Routing - Stack needs to be managed from US-West-2'

Parameters:
  Env:
    Type: String
    Default: ''
    Description: String to enable multiple deployments per AWS region
  PrimaryRegion:
    Type: String
    Description: Enter the Primary Region
    Default: "us-east-1"
  StandbyRegion:
    Type: String
    Description: Enter the Standby Region
    Default: "us-west-2"
  DomainName:
    Type: String
    Description: The name of the domain that you want created as a private hosted zone in Route53
  KmsKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: KmsKey
    Description: CMK Id
  PrimaryHealthCheckId:
    Type: String
    Default: ''
    Description: Optional Route53 health check ID for the primary region record
  StandbyHealthCheckId:
    Type: String
    Default: ''
    Description: Optional Route53 health check ID for the standby region record
  VpcIdPrimary:
    Type: String
    Description: VPC ID in the primary region
  VpcIdStandby:
    Type: String
    Description: VPC ID in the standby region

Conditions:
  HasPrimaryHealthCheck: !Not [!Equals [!Ref PrimaryHealthCheckId, '']]
  HasStandbyHealthCheck: !Not [!Equals [!Ref StandbyHealthCheckId, '']]

Resources:
  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Sub ${DomainName}
      VPCs:
        - VPCId: !Ref VpcIdPrimary
          VPCRegion: !Ref PrimaryRegion
        - VPCId: !Ref VpcIdStandby
          VPCRegion: !Ref StandbyRegion

  PrimaryRegionRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub store.${DomainName}
      # Weighted 50/50 across regions. With the ARC-managed health checks
      # attached, Route 53 automatically shifts to 100/0 when a region's
      # routing control is disabled (its health check reports unhealthy).
      Weight: 50
      Type: A
      SetIdentifier: PrimaryRegion
      HealthCheckId: !If [HasPrimaryHealthCheck, !Ref PrimaryHealthCheckId, !Ref 'AWS::NoValue']
      AliasTarget:
        DNSName: !Sub '{{resolve:secretsmanager:Alb-${PrimaryRegion}${Env}:SecretString:DnsName}}'
        EvaluateTargetHealth: true
        HostedZoneId: !Sub '{{resolve:secretsmanager:Alb-${PrimaryRegion}${Env}:SecretString:HostedZoneId}}'

  StandbyRegionRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub store.${DomainName}
      Weight: 50
      Type: A
      SetIdentifier: StandbyRegion
      HealthCheckId: !If [HasStandbyHealthCheck, !Ref StandbyHealthCheckId, !Ref 'AWS::NoValue']
      AliasTarget:
        DNSName: !Sub '{{resolve:secretsmanager:Alb-${StandbyRegion}${Env}:SecretString:DnsName}}'
        EvaluateTargetHealth: true
        HostedZoneId: !Sub '{{resolve:secretsmanager:Alb-${StandbyRegion}${Env}:SecretString:HostedZoneId}}'

  DNSRecordSecret:
    Type: AWS::SecretsManager::Secret
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: AwsSolutions-SMG4
            reason: "This secret stores a static DNS record value that does not require automatic rotation."
    Properties:
      Name: !Sub DNSRecordSecret${Env}
      Description: "Route53 DNS"
      KmsKeyId: !Ref KmsKey
      SecretString: !Ref PrimaryRegionRecord
      ReplicaRegions:
        - Region: !Ref StandbyRegion

  HostedZoneIdSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'HostedZoneIdSecret${Env}'
      SecretString: !Ref HostedZone
      KmsKeyId: !Ref KmsKey
      ReplicaRegions:
        - Region: !Ref StandbyRegion
